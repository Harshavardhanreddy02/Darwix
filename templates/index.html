<!DOCTYPE html>
<html lang="en">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VocalSync | Emotion-Driven TTS</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --accent: #38bdf8;
            --glass: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 20% 20%, #1e293b 0%, #0f172a 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            text-align: left;
            margin-top: 0;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .input-group {
            margin-top: 25px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            resize: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .action-btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: #0f172a;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .action-btn:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .output-panel {
            margin-top: 30px;
            padding: 20px;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.5);
            border-left: 4px solid var(--accent);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-tag {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        audio {
            margin-top: 15px;
            width: 100%;
            height: 40px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="main-card">
    <h1>VocalSync AI</h1>

    <form action="/analyze" method="post">
        <div class="input-group">
            <textarea name="text" placeholder="Enter text for emotional synthesis...">{{text if text else ""}}</textarea>
        </div>
        <button type="submit" class="action-btn">Synthesize Voice</button>
    </form>

    {% if emotion %}
    <div class="output-panel">
        <div class="stat-grid">
            <div>
                <div class="stat-tag">Detected Mood</div>
                <div class="stat-value">{{emotion | capitalize}}</div>
            </div>
            <div>
                <div class="stat-tag">Confidence</div>
                <div class="stat-value">{{intensity}}</div>
            </div>
        </div>

        <div class="stat-tag">Audio Modulation</div>
        <div style="font-size: 13px; margin-top: 5px; color: #cbd5e1;">
            Rate: {{params.rate}} | Vol: {{params.volume}} | Pitch: {{params.pitch}}
        </div>

        <audio controls>
            <source src="/audio" type="audio/mpeg">
        </audio>
    </div>
    {% endif %}
</div>

</body>
</html>
